name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVERLESS_ACCESS_KEY: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run comprehensive tests
        run: |
          yarn lint:check
          yarn tsc
          # Note: Integration tests would run here if available
          # yarn test

      - name: Build application
        run: yarn build

      - name: Prepare Lambda Layer
        run: yarn build-layer

      - name: Run security checks
        run: |
          yarn npm audit --severity moderate
        continue-on-error: true

      - name: Deploy Core APIs to Staging
        run: yarn serverless deploy --stage staging --verbose

      - name: Verify deployment
        run: |
          echo "Deployment completed for Staging environment"
          yarn serverless info --stage staging

      - name: Package deployment artifacts
        run: |
          yarn serverless package --stage staging
          ls -R .serverless
