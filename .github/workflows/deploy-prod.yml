name: Deploy Prod

on:
  workflow_dispatch:

env:
  SERVERLESS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "yarn"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run comprehensive tests
        run: |
          yarn lint:check
          yarn tsc
          # Note: Integration tests would run here if available
          # yarn test

      - name: Build application
        run: yarn build

      - name: Prepare Lambda Layer
        run: yarn build-layer

      - name: Run security checks
        run: |
          yarn npm audit --severity moderate
        continue-on-error: true

      - name: Deploy Core APIs to Prod
        run: yarn serverless deploy --stage Prod --verbose

      - name: Verify deployment
        run: |
          echo "Deployment completed for Prod environment"
          yarn serverless info --stage Prod

      - name: Package deployment artifacts
        run: |
          yarn serverless package --stage Prod
          ls -R .serverless
