name: Deploy Prod

on:
  workflow_dispatch:

env:
  SERVERLESS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}

jobs:
  deploy:
    name: Deploy Prod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Run comprehensive tests
        run: |
          yarn lint:check
          yarn tsc
          # Note: Integration tests would run here if available
          # yarn test

      - name: Build application
        run: yarn build

      - name: Prepare Lambda Layer
        run: yarn build-layer

      - name: Run security checks
        run: |
          yarn npm audit --severity moderate
        continue-on-error: true

      - name: Deploy Core APIs to Prod
        run: yarn serverless deploy --stage Prod --verbose

      - name: Verify deployment
        run: |
          echo "Deployment completed for Prod environment"
          yarn serverless info --stage Prod

      - name: Package deployment artifacts
        run: |
          yarn serverless package --stage Prod
          ls -R .serverless
